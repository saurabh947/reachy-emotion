syntax = "proto3";

package emotion;

// ─────────────────────────────────────────────────────────────────────────────
// Emotion Detection Service
//
// Single bidirectional-streaming RPC: the robot (reachy-emotion) opens one
// long-lived stream per session, sends video frames + audio chunks as they
// arrive, and receives NeuralEmotionResult messages back in real time.
//
// Session lifecycle:
//   1. Client opens StreamEmotion and sends an initial frame with session_id.
//   2. Server creates an EmotionDetector instance for that session_id.
//   3. Client streams frames continuously (10–30 fps typical).
//   4. Server replies after the 16-frame rolling buffer warms up.
//   5. Client closes the stream → server tears down the session.
// ─────────────────────────────────────────────────────────────────────────────

service EmotionDetection {
  // Bidirectional streaming inference.
  // One stream = one robot session. Server maintains the 16-frame rolling
  // buffer for the duration of the stream.
  rpc StreamEmotion(stream EmotionRequest) returns (stream EmotionResponse);

  // Lightweight liveness / readiness probe.
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

// ─── Request ─────────────────────────────────────────────────────────────────

message EmotionRequest {
  // Stable identifier for this robot session.  Must be set on every frame
  // (server uses it to look up the rolling buffer).
  string session_id = 1;

  // Raw RGB pixel data, row-major, uint8, shape [frame_height × frame_width × 3].
  // Send RGB (not BGR). The server flips to BGR before passing to the SDK.
  // No compression — kept raw to avoid decode latency on the hot path.
  bytes video_frame = 2;
  int32 frame_width  = 3;
  int32 frame_height = 4;

  // Raw PCM audio samples, float32 little-endian (optional).
  // If absent the model runs in video-only mode using a learned absent token.
  bytes audio_chunk       = 5;
  int32 audio_sample_rate = 6;  // Hz; ignored when audio_chunk is empty

  // Client-side wall-clock timestamp (ms since Unix epoch).
  // Echoed back in EmotionResponse for round-trip latency tracking.
  int64 timestamp_ms = 7;
}

// ─── Response ────────────────────────────────────────────────────────────────

message EmotionResponse {
  // Echoed from the request.
  string session_id = 1;

  // One of: angry | happy | sad | neutral | surprised | fearful | disgusted | unclear
  string dominant_emotion = 2;

  // Per-class softmax probabilities (keys match the 8 emotion labels above).
  map<string, float> confidence_scores = 3;

  // Derived scalar metrics in [0, 1].
  float stress      = 4;
  float engagement  = 5;
  float arousal     = 6;

  // Aggregate confidence of the fused prediction.
  float overall_confidence = 7;

  // 512-dimensional latent embedding from the fusion layer.
  // Useful for downstream VLA / Gemini tool-call context.
  // packed=true cuts ~30% off wire size vs. repeated float default encoding.
  repeated float embedding = 8 [packed = true];

  // Server-side timestamp when inference completed (ms since Unix epoch).
  int64 timestamp_ms = 9;

  // Non-empty only on error.  Client should log and continue streaming.
  string error = 10;

  // True while the 16-frame buffer is still warming up.
  // Client should not act on emotion data until this is false.
  bool buffering = 11;
}

// ─── Health ──────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  bool   healthy         = 1;
  string model_status    = 2;  // "ready" | "loading" | "unreachable"
  int32  active_sessions = 3;
}
